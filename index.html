<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1: iOSで入力欄フォーカス時の自動ズームを防ぐ（ピンチ拡大はiOS10以降OSが常時許可するため損なわれない） -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>GAME100 - 100種類のミニゲーム</title>
    <meta name="description" content="100種類のミニゲームで遊べる、オフライン対応の無料ゲームアプリ。iPhone・Android・iPadのホーム画面に追加して遊べます。" />
    <meta name="theme-color" content="#12142b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GAME100" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <style>
      /* JS 読み込み前の一瞬だけ表示される起動スプラッシュ（main.ts が置き換える） */
      html, body { margin: 0; background: #12142b; height: 100%; }
      .boot-splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #fff; font-family: sans-serif; }
      .boot-splash .logo { width: 88px; height: 88px; border-radius: 20px; }
      .boot-splash .name { font-weight: 700; letter-spacing: 0.25em; opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-splash" aria-hidden="true">
        <img class="logo" src="icons/icon-192.png" alt="" width="88" height="88" />
        <div class="name">GAME100</div>
      </div>
    </div>
    <noscript>
      <div style="position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; background: #12142b; color: #f2f3fb; font-family: sans-serif; text-align: center; padding: 24px;">
        GAME100 を利用するには JavaScript を有効にしてください。
      </div>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
